<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ATS</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="root">
      <img class="logo" id="logo-img" alt="ATS logo" />
      <h1>Assembly-TimeSharp</h1>
      <button id="toggle-btn" type="button">Loading...</button>
      <p id="toggle-help">This will Enable/Disable on the Current Tab</p>
      <p class="tab-line" id="site-label">Current Tab: Loading...</p>
      <label class="mode-label" for="label-mode">Time Label</label>
      <select id="label-mode">
        <option value="IGT">IGT</option>
        <option value="LRT">LRT</option>
      </select>
      <button id="save-btn" type="button">Save Current Site Retime</button>
      <div class="btn-row">
        <button id="export-btn" type="button">Export Saved Retimes File</button>
        <button id="import-btn" type="button">Import Saved Retimes File</button>
      </div>
      <input id="import-file" type="file" accept=".json,application/json" hidden />
      <p id="save-status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
